apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-config
  namespace: postgresql
data:
  postgresql.conf: |
    # Optimized settings for Raspberry Pi 4 (4GB RAM) with 2GB Pod Limit
    listen_addresses = '*'
    max_connections = 50
    shared_buffers = 512MB
    effective_cache_size = 1536MB
    maintenance_work_mem = 128MB
    checkpoint_completion_target = 0.9
    wal_buffers = 16MB
    default_statistics_target = 100
    random_page_cost = 1.1
    effective_io_concurrency = 200
    work_mem = 16MB
    huge_pages = off
    min_wal_size = 1GB
    max_wal_size = 4GB

    # Tuning for pgvector (HNSW)
    maintenance_work_mem = 256MB  # Increased for faster indexing

    # Logging
    log_min_duration_statement = 500
    log_checkpoints = on
    log_lock_waits = on
    log_temp_files = 0
    log_autovacuum_min_duration = 0
    log_error_verbosity = default
