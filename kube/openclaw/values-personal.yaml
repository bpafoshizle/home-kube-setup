# Personal OpenClaw instance overrides
# Deployed to namespace: openclaw

app-template:
  controllers:
    main:
      containers:
        main:
          env:
            OPENCLAW_MODELS_ALLOW: "anthropic/claude-sonnet-4-5,anthropic/claude-haiku-4-5,openai/gpt-5-mini,xai/grok-4-1-fast-reasoning,xai/grok-4-1-fast,ollama/gpt-oss:120b,ollama/minimax-m2.5:cloud,ollama/glm-5:cloud"
  persistence:
    config:
      name: openclaw-config
  service:
    main:
      annotations:
        metallb.universe.tf/loadBalancerIPs: 192.168.0.204
  configMaps:
    config:
      data:
        openclaw.json: |
          {
            "gateway": {
              "port": 18789,
              "mode": "local",
              "trustedProxies": ["10.0.0.1"],
              "controlUi": {
                "allowInsecureAuth": true,
                "dangerouslyDisableDeviceAuth": true,
                "allowedOrigins": ["http://192.168.0.204:18789"]
              }
            },

            "browser": {
              "enabled": true,
              "defaultProfile": "default",
              "profiles": {
                "default": {
                  "cdpUrl": "http://localhost:9222",
                  "color": "#4285F4"
                }
              }
            },

            "models": {
              "providers": {
                "ollama": {
                  "baseUrl": "https://ollama.com/v1",
                  "apiKey": "${OLLAMA_API_KEY}",
                  "api": "openai-completions",
                  "models": [
                    {
                      "id": "gpt-oss:120b",
                      "name": "GPT-OSS 120B (Ollama Cloud)",
                      "reasoning": false,
                      "input": ["text"],
                      "cost": {
                        "input": 0,
                        "output": 0,
                        "cacheRead": 0,
                        "cacheWrite": 0
                      },
                      "contextWindow": 131072,
                      "maxTokens": 1310720
                    },
                    {
                      "id": "minimax-m2.5:cloud",
                      "name": "MiniMax M2.5 (Ollama Cloud)",
                      "reasoning": false,
                      "input": ["text"],
                      "cost": {
                        "input": 0,
                        "output": 0,
                        "cacheRead": 0,
                        "cacheWrite": 0
                      },
                      "contextWindow": 131072,
                      "maxTokens": 1310720
                    },
                    {
                      "id": "glm-5:cloud",
                      "name": "GLM-5 (Ollama Cloud)",
                      "reasoning": false,
                      "input": ["text"],
                      "cost": {
                        "input": 0,
                        "output": 0,
                        "cacheRead": 0,
                        "cacheWrite": 0
                      },
                      "contextWindow": 131072,
                      "maxTokens": 1310720
                    }
                  ]
                }
              }
            },

            "agents": {
              "defaults": {
                "workspace": "/home/node/.openclaw/workspace",
                "model": {
                  "primary": "xai/grok-4-1-fast"
                },
                "models": {
                  "anthropic/claude-sonnet-4-5": {
                    "alias": "sonnet"
                  },
                  "anthropic/claude-haiku-4-5": {
                    "alias": "haiku"
                  },
                  "openai/gpt-5-mini": {
                    "alias": "gpt5mini"
                  },
                  "ollama/gpt-oss:120b": {
                    "alias": "gptoss"
                  },
                  "ollama/minimax-m2.5:cloud": {
                    "alias": "minimax"
                  },
                  "ollama/glm-5:cloud": {
                    "alias": "glm5"
                  },
                  "xai/grok-4-1-fast-reasoning": {
                    "alias": "grok-reasoning"
                  },
                  "xai/grok-4-1-fast": {
                    "alias": "grok"
                  }
                },
                "userTimezone": "America/Chicago",
                "timeoutSeconds": 600,
                "maxConcurrent": 1
              },
              "list": [
                {
                  "id": "main",
                  "default": true,
                  "identity": {
                    "name": "Neumann",
                    "emoji": "\ud83e\udde0"
                  }
                }
              ]
            },

            "session": {
              "scope": "per-sender",
              "store": "/home/node/.openclaw/sessions",
              "reset": {
                "mode": "idle",
                "idleMinutes": 60
              }
            },

            "logging": {
              "level": "info",
              "consoleLevel": "info",
              "consoleStyle": "compact",
              "redactSensitive": "tools"
            },

            "tools": {
              "profile": "full",
              "web": {
                "search": {
                  "enabled": false
                },
                "fetch": {
                  "enabled": true
                }
              }
            }
          }
