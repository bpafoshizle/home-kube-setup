---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: signal-cli-data
  namespace: openclaw
  labels:
    app.kubernetes.io/name: signal-cli
    app.kubernetes.io/instance: signal-cli
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: managed-nfs-storage
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: signal-cli
  namespace: openclaw
  labels:
    app.kubernetes.io/name: signal-cli
    app.kubernetes.io/instance: signal-cli
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: signal-cli
      app.kubernetes.io/instance: signal-cli
  template:
    metadata:
      labels:
        app.kubernetes.io/name: signal-cli
        app.kubernetes.io/instance: signal-cli
    spec:
      containers:
        - name: signal-cli
          image: bbernhard/signal-cli-rest-api:0.99
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              chown -R 1000:1000 /home/.local/share/signal-cli
              exec setpriv --reuid=1000 --regid=1000 --init-groups \
                signal-cli --config /home/.local/share/signal-cli daemon \
                --http 0.0.0.0:8080 \
                --receive-mode on-start \
                --ignore-stories \
                --ignore-avatars \
                --ignore-stickers
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /home/.local/share/signal-cli
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: signal-cli-data
---
apiVersion: v1
kind: Service
metadata:
  name: signal-cli
  namespace: openclaw
  labels:
    app.kubernetes.io/name: signal-cli
    app.kubernetes.io/instance: signal-cli
spec:
  selector:
    app.kubernetes.io/name: signal-cli
    app.kubernetes.io/instance: signal-cli
  ports:
    - name: http
      port: 8080
      targetPort: http
